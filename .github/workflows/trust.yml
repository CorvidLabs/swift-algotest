name: trust

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  trust:
    runs-on: ubuntu-latest
    container: swift:6.0
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Fetch trusted base
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch origin main:refs/remotes/origin/main
      - name: Install Trust runtime
        run: apt-get update && apt-get install -y ca-certificates curl python3
      - name: Install Fledge runtime
        env:
          FLEDGE_SHA256: 9a2c5a0db698811052ad741dd8da5a3e8af5e46797f11b6cc59dffbd49917170
        run: |
          curl -fsSL \
            https://github.com/CorvidLabs/fledge/releases/download/v1.7.0/fledge-linux-x86_64 \
            -o /usr/local/bin/fledge
          actual="$(shasum -a 256 /usr/local/bin/fledge | awk '{print $1}')"
          if [ "$actual" != "$FLEDGE_SHA256" ]; then
            echo "::error::Fledge 1.7.0 checksum mismatch"
            exit 1
          fi
          chmod +x /usr/local/bin/fledge
      - name: SpecSync lifecycle gate
        uses: CorvidLabs/spec-sync@a89d827e93fa0bc9e6168447e66a0ad30fa92e65 # v5.1.1
        with:
          version: "5.1.1"
          root: .
          strict: "true"
          require-coverage: "100"
          lifecycle-enforce: "true"
      - name: CorvidLabs Trust gate
        id: trust
        uses: CorvidLabs/trust@a239f78658e5ad0f12fa230f494890e40c6e4d7b # v1.1.1
        with:
          range: ${{ github.event_name == 'pull_request' && format('{0}..{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha) || format('{0}..{1}', github.event.before, github.sha) }}
